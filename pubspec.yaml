name: eng_friend
description: "한국말 잘하는 미국인 친구 - AI 영어 학습 앱"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Voice
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  record: ^6.0.0

  # Local Storage
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Utils
  uuid: ^4.5.1
  path_provider: ^2.1.5
  path: ^1.9.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
    - assets/lottie/
